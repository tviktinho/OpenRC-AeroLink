; =============================================================================
; OpenRC AeroLink — C3_RX_SBUS
; Receptor nRF24L01 → SBUS para Matek F411-RX (Betaflight)
; Plataforma: ESP32-C3 Super Mini (RISC-V, USB-C nativo)
; =============================================================================
;
; COMANDOS:
;   pio run                          ; compila
;   pio run -t upload                ; compila e grava
;   pio device monitor               ; Serial Monitor (USB CDC, 115200)
;   pio run -t upload -t monitor     ; grava e abre monitor
;
; PROBLEMAS COMUNS:
;   - Upload falha: segura BOOT (GPIO9) → aperta RESET → solta RESET → solta BOOT.
;   - Serial.print() não aparece: confere ARDUINO_USB_CDC_ON_BOOT=1.

[platformio]
default_envs = c3_rx_sbus

[env:c3_rx_sbus]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0

lib_deps =
    nrf24/RF24 @ ^1.4.10
