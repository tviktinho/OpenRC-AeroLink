; ==============================================================================
; PlatformIO config para o ESP32 Flight Controller v2 — OpenRC AeroLink
;
; Uso:
;   1. Instale PlatformIO (extensão do VSCode)
;   2. File → Open Folder → selecione a pasta `firmware/ESP32_FC_v2/`
;   3. PlatformIO detecta este arquivo e configura tudo automaticamente
;   4. Compile:        pio run                         (ou botão ✓ no rodapé)
;   5. Upload:         pio run --target upload         (ou botão → no rodapé)
;   6. Serial Monitor: pio device monitor              (ou botão 🔌 no rodapé)
;
; ATENÇÃO: este arquivo está dentro da pasta de firmware do FC v2. Não confunda
; com o firmware do TX_NANO_v2 (que tem seu próprio platformio.ini).
; ==============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Velocidade de upload (alguns clones ESP32 não aguentam 921600 — se travar, baixe para 460800)
upload_speed = 921600

; Velocidade do Serial Monitor — bate com o Serial.begin(115200) do firmware
monitor_speed = 115200

; Filtros do monitor pra mostrar caracteres especiais corretamente
monitor_filters = esp32_exception_decoder, time

; Bibliotecas necessárias
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.5

; Flags de build — manter Arduino Core
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0

; Onde o PlatformIO procura os arquivos fonte.
; Por padrão é `src/`, mas como deixamos os .ino e .h soltos na raiz desta
; pasta (compatível com Arduino IDE), aponta para "."
src_dir = .
