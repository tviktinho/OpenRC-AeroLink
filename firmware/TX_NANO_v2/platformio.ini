; ==============================================================================
; PlatformIO config para o NANO_TX v2 — OpenRC AeroLink
;
; Uso:
;   1. Instale PlatformIO (extensão do VSCode)
;   2. File → Open Folder → selecione a pasta `firmware/TX_NANO_v2/`
;   3. PlatformIO detecta este arquivo e configura tudo automaticamente
;   4. Compile:    pio run
;   5. Upload:     pio run --target upload
;
; CLONE COM CH340 / OLD BOOTLOADER:
;   Se você tem clone com chip CH340 e o upload falhar com "not in sync resp=0xe0",
;   troque `board` abaixo de `nanoatmega328new` para `nanoatmega328` (sem "new").
;   O `nanoatmega328` usa baud 57600 (old bootloader); o `nanoatmega328new` usa 115200.
;
; ATENÇÃO:
;   * A HW Serial do Nano é DEDICADA ao CRSF (TX0/D1 → Heltec) — não use Serial.print()
;     no firmware (vai bagunçar o CRSF).
;   * Antes do upload, DESCONECTE o fio TX0 → Heltec, senão o avrdude não fala
;     com o bootloader.
; ==============================================================================

; Seção global do projeto — `src_dir` PRECISA ficar aqui (fora dos envs).
; PIO ignora `src_dir` se estiver dentro de [env:...] e cai pro padrão `src/`,
; resultando em "undefined reference to setup()" no linking.
[platformio]
src_dir = .

[env:nano_old_bootloader]
; Use esta env se você tem clone CH340 ou bootloader antigo (mais comum em clones BR)
platform = atmelavr
board = nanoatmega328         ; old bootloader, baud 57600
framework = arduino
upload_speed = 57600
monitor_speed = 400000        ; coerente com CRSF; mas não há prints úteis aqui

lib_deps =
    nrf24/RF24 @ ^1.4.10


[env:nano_new_bootloader]
; Use esta env se você tem Nano original ou clone com bootloader novo (raro)
platform = atmelavr
board = nanoatmega328new      ; new bootloader, baud 115200
framework = arduino
upload_speed = 115200
monitor_speed = 400000

lib_deps =
    nrf24/RF24 @ ^1.4.10
