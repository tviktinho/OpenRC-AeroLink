; ==============================================================================
; PlatformIO config para o NANO_TX v3 — OpenRC AeroLink
;
; Diferenças vs v2:
;   - Trims digitais via PCF8574 (I2C, addr 0x20) na placa de expansão
;   - AUX binário extra em D2 (INPUT_PULLUP)
;   - Calibração de gimbal e offsets de trim persistidos em EEPROM
;   - Código modularizado em src/ (não usa src_dir=. como o v2)
;
; Uso:
;   1. PlatformIO (extensão do VSCode) → File → Open Folder → NANO_TX_v3/
;   2. Compile:    pio run -e nano_old_bootloader
;   3. Upload:     pio run -e nano_old_bootloader -t upload
;
; Qual env usar?
;   - nano_old_bootloader (57600 baud, board nanoatmega328)    → clones CH340/BR
;   - nano_new_bootloader (115200 baud, board nanoatmega328new) → Nano original
;
; ATENÇÃO ANTES DE GRAVAR:
;   * A HW Serial (D0/D1) é DEDICADA ao CRSF. Não use Serial.print() na operação
;     normal (vai bagunçar o frame). O scanner I2C imprime no setup() apenas
;     porque o CRSF ainda não começou.
;   * Se houver fio TX0/D1 → módulo CRSF, DESCONECTE antes do upload, senão o
;     avrdude não fala com o bootloader.
; ==============================================================================

[platformio]
default_envs = nano_old_bootloader

[env]
platform     = atmelavr
framework    = arduino
monitor_speed = 400000        ; igual ao CRSF baud; não há prints úteis em runtime

lib_deps =
    nrf24/RF24 @ ^1.4.10
; Wire e EEPROM são parte do core Arduino — não precisam estar em lib_deps.
; PCF8574 é falado direto via Wire (1 write + 1 read por loop, sem lib externa).

[env:nano_old_bootloader]
; Clone CH340 / bootloader antigo (mais comum em BR)
board        = nanoatmega328         ; 57600 baud
upload_speed = 57600

[env:nano_new_bootloader]
; Nano original / clone com bootloader novo (raro)
board        = nanoatmega328new      ; 115200 baud
upload_speed = 115200
