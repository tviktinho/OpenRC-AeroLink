; OpenRC AeroLink — ESP32_RX_SBUS
; Receptor caseiro nRF24 V2 → SBUS para FC comercial (Matek F411-RX testado).
;
; Compile:        pio run
; Upload:         pio run -t upload
; Upload+Monitor: pio run -t upload -t monitor
; Monitor only:   pio device monitor -b 115200
;
; Se o PIO não detectar a porta COM sozinho:
;   pio run -t upload --upload-port COM5
;   pio device monitor -b 115200 -p COM5

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32 DevKit (WROOM-32) — sem PSRAM, GPIO16/17 livres.
; Se você tiver WROVER (com PSRAM), o board ainda compila igual; só não use
; GPIO16/17 — o sketch já está em GPIO25 (SBUS) e GPIO26 (CSN) por segurança.

build_flags =
    -D CORE_DEBUG_LEVEL=1

lib_deps =
    nrf24/RF24@^1.4.10
