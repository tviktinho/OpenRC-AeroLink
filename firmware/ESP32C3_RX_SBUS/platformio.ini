; OpenRC AeroLink — ESP32-C3 Mini receptor nRF24 V2 → PPM single-wire
;
; HARDWARE:
;   ESP32-C3 Super Mini / LOLIN C3 Mini (USB-C nativo, RISC-V single-core)
;   + nRF24L01 PA+LNA (SPI)
;   + RMT bit-bang p/ PPM single-wire (GPIO21 → pad PPM da FC)
;
; COMANDOS:
;   pio run                              ; só compila
;   pio run -t upload                    ; compila e sobe
;   pio device monitor                   ; abre Serial Monitor (USB CDC, 115200)
;   pio run -t upload -t monitor         ; sobe e já abre o monitor

[platformio]
default_envs = esp32c3_rx_sbus

[env:esp32c3_rx_sbus]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0

lib_deps =
    nrf24/RF24 @ ^1.4.10
