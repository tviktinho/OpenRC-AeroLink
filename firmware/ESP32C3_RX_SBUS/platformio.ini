; OpenRC AeroLink — ESP32-C3 Mini receptor nRF24 V2 → SBUS
;
; HARDWARE:
;   ESP32-C3 Super Mini / LOLIN C3 Mini (USB-C nativo, RISC-V single-core)
;   + nRF24L01 PA+LNA (SPI)
;   + UART1 invertido p/ SBUS (saída TX → pad R2 da Matek F411-RX)
;
; COMANDOS:
;   pio run                              ; só compila
;   pio run -t upload                    ; compila e sobe
;   pio device monitor                   ; abre Serial Monitor (USB CDC, 115200)
;   pio run -t upload -t monitor         ; sobe e já abre o monitor
;
; PROBLEMAS COMUNS:
;   - Se upload falhar, segura BOOT (GPIO9), aperta RESET, solta RESET, solta BOOT.
;     A maioria das Super Mini não precisa, mas algumas placas baratas exigem.
;   - Se Serial.print() não aparecer, confere ARDUINO_USB_CDC_ON_BOOT=1.

[platformio]
default_envs = esp32c3_rx_sbus

[env:esp32c3_rx_sbus]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0

lib_deps =
    nrf24/RF24 @ ^1.4.10
