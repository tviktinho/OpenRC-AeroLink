; ==============================================================================
; PlatformIO config — CRSF Sniffer pro ESP32-C3 mini
;
; Uso:
;   1. Abrir esta pasta no VSCode (com extensão PlatformIO)
;   2. pio run --target upload
;   3. pio device monitor
;
; OBS: o board "esp32-c3-devkitm-1" cobre a maioria dos ESP32-C3 mini
; genéricos. Se sua placa específica não funcionar, tenta:
;   - esp32-c3-devkitc-02
;   - lolin_c3_mini
;   - airm2m_core_esp32c3
; ==============================================================================

[platformio]
src_dir = .

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_c3_exception_decoder, time

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
