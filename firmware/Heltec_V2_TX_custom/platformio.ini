; ==============================================================================
; PlatformIO config — Heltec V2 TX customizado (Fase 2)
; OpenRC AeroLink, protocolo próprio sobre LoRa
;
; Uso:
;   pio run -t upload
;   pio device monitor
; ==============================================================================

[platformio]
src_dir = .

[env:heltec_v2_custom_tx]
platform = espressif32
board = heltec_wifi_lora_32_V2
framework = arduino

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; LoRa do Sandeep Mistry — API simples, bem documentada
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
